<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate Generator</title>
    <script src="pdf-lib.min.js"></script>
    <script src="fontkit.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        textarea { width: 100%; margin-top: 5px; }
        select { margin-top: 5px; width: 100%; padding: 5px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; color: #333; }
        .hint { font-size: 0.9em; color: #555; font-weight: normal; }
    </style>
</head>
<body>
    <h1>Certificate Generator</h1>

    <label>1. Upload PDF Template:
        <br><span class="hint">(Must be exported from Illustrator with the name field completely BLANK)</span>
    </label>
    <input type="file" id="pdfUpload" accept=".pdf">

    <label>2. Upload Custom Fonts (.ttf or .otf):
        <br><span class="hint">(You can upload multiple files)</span>
    </label>
    <input type="file" id="fontUpload" accept=".ttf,.otf" multiple>

    <label>3. Select Font to Use:</label>
    <select id="fontSelect">
        <option value="default">Default (Helvetica)</option>
    </select>

    <label>4. Paste Names (One per line):</label>
    <textarea id="namesList" rows="10" placeholder="Jane Doe&#10;John Smith"></textarea>

    <button id="generateBtn">Generate Certificates</button>
    <p id="status"></p>

    <script src="app.js"></script>
</body>
</html>
